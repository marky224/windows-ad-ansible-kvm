name: ansible-lint

# Lints the Ansible content at the 'min' profile -- only the rules that would make
# Ansible itself fail (syntax-check, load/parser/internal errors). Style/convention
# profiles are deliberately NOT enforced; see ansible/.ansible-lint and _private ADR-051.
#
# Everything is pinned (ansible-core, ansible-lint, and the collections in
# requirements.yml) so the gate is deterministic: it can only go red if the committed
# code actually breaks Ansible -- never because an upstream dependency shifted.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ansible-lint (min profile)
    runs-on: ubuntu-latest
    env:
      ANSIBLE_CORE_VERSION: "2.21.0"
      ANSIBLE_LINT_VERSION: "26.4.0"
    defaults:
      run:
        working-directory: ansible
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-lint (pinned)
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "ansible-core==${ANSIBLE_CORE_VERSION}" "ansible-lint==${ANSIBLE_LINT_VERSION}"
          ansible-lint --version

      - name: Install pinned collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint (min profile, offline)
        env:
          # ansible.cfg points vault_password_file at a local path that does not exist on
          # the runner. syntax-check never decrypts the vault, but we hand it a throwaway,
          # non-secret password file so a missing-file lookup can't false-red the gate.
          # The REAL vault password is never placed in CI.
          ANSIBLE_VAULT_PASSWORD_FILE: /tmp/ci-throwaway-vault-pass
        run: |
          set -euo pipefail
          echo "not-the-real-password" > /tmp/ci-throwaway-vault-pass
          ansible-lint --offline playbooks/ roles/
