---
# Client-specific overrides. Pre-join: connect as the local Administrator whose
# password is baked at install time by the Autounattend (05-provision-clients.yml
# passes vm_local_admin_password from this same vault key).
#
# Per the M6 design decision (2026-05-30): workstation local admin is split from
# the DC bootstrap admin — its own vault_client_local_admin_password (one shared
# value across both clients). LAPS is the eventual per-machine-unique endgame.
# Steady-state Ansible identity post-join remains the named domain admin.
ansible_user: Administrator
ansible_password: "{{ vault_client_local_admin_password }}"

# Per-host network reservations (consumed by ad_dhcp role).
# IPs match inventory ansible_host values + NETWORK.md.
client_dhcp_reservations:
  CLIENT01-corp:
    mac: "52:54:00:11:11:01"
    ip: 10.10.0.50
  CLIENT02-corp:
    mac: "52:54:00:11:11:02"
    ip: 10.10.0.51
