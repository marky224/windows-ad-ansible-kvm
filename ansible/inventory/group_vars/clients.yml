---
# Client-specific overrides. Pre-join: connect as local Administrator.
# Post-join (after domain_join_windows role): switch to named admin UPN
# (madmin-da@corp.markandrewmarquez.com) — same identity as dc.yml steady-state.
#
# TODO (Milestone 4 / client provisioning): split clients onto their own
# vault_client_local_admin_password so the DC's bootstrap admin password is not
# shared with workstation local admins. For now (no clients built yet),
# vault_dc_admin_password is reused — dormant code path.
ansible_user: Administrator
ansible_password: "{{ vault_dc_admin_password }}"

# Per-host network reservations (consumed by ad_dhcp role).
# IPs match inventory ansible_host values + NETWORK.md.
client_dhcp_reservations:
  CLIENT01-corp:
    mac: "52:54:00:11:11:01"
    ip: 10.10.0.50
  CLIENT02-corp:
    mac: "52:54:00:11:11:02"
    ip: 10.10.0.51
