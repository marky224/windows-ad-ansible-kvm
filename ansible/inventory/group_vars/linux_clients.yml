---
# Linux client connection (cloud-init provisions an initial 'labadmin' user; the
# domain_join_linux role adds realmd/sssd and joins the realm).

ansible_connection: ssh
ansible_user: labadmin
ansible_become: true
ansible_become_method: sudo
# Key-based auth using the dedicated lab keypair generated by kvm_linux_vm
# (outside the repo). UserKnownHostsFile=/dev/null so SSH to guests never writes
# to the control host's ~/.ssh/known_hosts (host-safety: leave the host alone).
ansible_ssh_private_key_file: "{{ vm_lab_root }}/ssh/corp-lab"
ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

linux_client_dhcp_reservations:
  UBUNTU01-corp:
    mac: "52:54:00:22:22:01"
    ip: 10.10.0.60
