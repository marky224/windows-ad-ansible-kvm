---
# dc_replica group (ADDC02) — Phase 6 Branch-Site replica DC (ADR-052 / ADR-055).
#
# STEADY-STATE IDENTITY (post-promotion): connect as the named domain admin
# (madmin-da), exactly like group_vars/dc.yml. After SM5 promotion this is ADDC02's
# ONLY usable WinRM identity:
#   - the pre-promo LOCAL Administrator no longer exists (local SAM removed at promo);
#   - the domain RID 500 is SMARTCARD_REQUIRED (ADR-033, replicated from ADDC01),
#     so it can't password-auth over WinRM.
#
# BOOTSTRAP IDENTITY (pre-promotion): Play 1 of 13-promote-addc02.yml OVERRIDES
# these to the LOCAL Administrator + vault_dc_admin_password (the only identity that
# works on the pre-promo workgroup box). See that playbook's header.
ansible_user: "{{ named_admin.upn }}"
ansible_password: "{{ vault_named_admin_password }}"

# Replica DC role markers — consumed by ad_* roles. Contrast group_vars/dc.yml:
# ADDC02 holds NO FSMO roles, is a GC + DNS, and (for now) no DHCP. FSMO all stay
# on ADDC01 (ADR-052 decision 6); reciprocal hot-standby DHCP + Branch scope is SM7.
dc_role:
  primary: false
  hold_fsmo_roles: false
  install_dhcp: true         # SM7: Branch scope (ADDC02 primary) + reciprocal hot-standby failover
  install_dns: true          # GC + DNS at Branch (WAN-resilient name resolution)
  install_ad_cs: false       # single CA on ADDC01
  install_wsus: false        # single WSUS on ADDC01
  is_pdc_time_source: false  # ADDC02 syncs time from the PDC (ADDC01) down the domain hierarchy

# DSRM (Directory Services Restore Mode) password — required by
# microsoft.ad.domain_controller. Kept distinct from vault_dc_admin_password per
# ADR-031 (same rationale as group_vars/dc.yml).
safe_mode_password: "{{ vault_safe_mode_password }}"

# --- Phase 6 SM6: DNS client cross-pointing (ADR-052 amendment, 2026-06-03) ---
# SELF-FIRST ordering (full rationale + sources in group_vars/dc.yml). ADDC02 is the
# ONLY DC in Branch-Site, reachable to HQ only across the ISOLATED VyOS WAN — so it
# must prefer its OWN local DNS and keep serving the branch when the link is down,
# with ADDC01 as the alternate. This is the whole point of a branch DC; it is the
# exact case MS KB 825036 warns about for remote-preferred DNS. Island-safe post-SM5
# (both _msdcs CNAMEs resolve, AD-integrated zones). Applied by 14-dns-crosspoint.yml.
dc_dns_servers:
  - 127.0.0.1                     # preferred: ADDC02 resolves locally (branch survives a WAN cut)
  - "{{ corp_subnet.dc_ip }}"     # alternate: ADDC01 (10.10.0.10) across the inter-site link

# --- Phase 6: Branch DNS SERVER forwarders (ADDC02 has no internet path) ---
# ADDC02 sits in the ISOLATED Branch-Site (no NAT/internet — verified live: it cannot reach
# 9.9.9.9). It forwards all external (non-authoritative) queries to ADDC01 (the hub), which
# resolves them via its Quad9 forwarders. DC promotion set this forwarder INCIDENTALLY (the
# promo-time DNS-client server became a forwarder); declared here so a rebuild can't depend on
# that luck — same discipline as ADR-055(c)'s explicit RegisterThisConnectionsAddress.
# Root-hint fallback is OFF: the isolated branch can provably never reach the internet root
# servers, so the fallback is dead weight (MS guidance: clear "use root hints" when a server
# shouldn't contact the internet directly and has a reliable forwarder). The 13 root hints stay
# loaded (MS requires >=1); we just don't fall back to them. Applied by
# playbooks/15-branch-dns-forwarders.yml (reuses ad_dns/tasks/forwarders.yml). NOTE: do NOT run
# the FULL ad_dns role against dc_replica — its scavenging belongs on ONE server (ADDC01).
ad_dns_forwarders:
  - "{{ corp_subnet.dc_ip }}"   # ADDC01 (10.10.0.10) — the only external-resolution path from the isolated branch
ad_dns_use_root_hints: false    # forward-only; roots are unreachable from the isolated branch

# --- Phase 6 SM7: Branch-Site DHCP scope (ADDC02 primary) ---
# ADDC02 runs DHCP for the Branch subnet (10.20.0.0/24), serving branch clients
# directly (on-subnet). Reuses the ad_dhcp role with these per-group overrides (the
# role's defaults target the HQ/corp subnet for ADDC01; only the IP/scope/options
# differ). Applied by playbooks/16-branch-dhcp.yml; the reciprocal hot-standby
# failover relationship (ADDC02 primary for Branch, ADDC01 standby; and vice versa
# for HQ) is playbooks/17-dhcp-failover.yml. No branch clients exist yet, so the
# scope is client-less for now (empty reservations).
ad_dhcp_scope_id: "{{ branch_subnet.cidr.split('/')[0] }}"   # 10.20.0.0
ad_dhcp_scope_name: "Branch Site Scope"
ad_dhcp_scope_description: "Branch-Site scope (10.20.0.0/24); ADDC02 primary, ADDC01 hot-standby (SM7)"
ad_dhcp_scope_start: "{{ branch_subnet.dhcp_scope_start }}"
ad_dhcp_scope_end: "{{ branch_subnet.dhcp_scope_end }}"
ad_dhcp_subnet_mask: "{{ branch_subnet.netmask }}"
ad_dhcp_exclusions:
  - start: "{{ branch_subnet.dhcp_reservation_range_start }}"
    end: "{{ branch_subnet.dhcp_reservation_range_end }}"
ad_dhcp_authorize_ip: "{{ branch_subnet.dc_ip }}"            # ADDC02 (10.20.0.10)
ad_dhcp_scope_options:
  router: "{{ branch_subnet.gateway }}"          # VyOS branch leg (10.20.0.1) = branch clients' gateway
  dns_servers:
    - "{{ branch_subnet.dc_ip }}"                # ADDC02 (local DNS at the branch)
  dns_domain_name: "{{ forest.fqdn }}"
  ntp_servers:
    - "{{ branch_subnet.dc_ip }}"                # ADDC02 (syncs time from the PDC down the domain hierarchy)
ad_dhcp_reservations: {}                          # no branch clients yet

# --- Phase 6 SM7 part 2: DHCP failover — ADDC02 is ACTIVE for the Branch scope ───
# Reciprocal hot-standby ("Symmetric Model", MS-documented): ADDC02 serves the Branch scope
# 10.20.0.0/24 and is the hot-standby partner for the HQ scope. The relationship is
# CREATED ON ADDC02 (the active side) by playbooks/17-dhcp-failover.yml; creation
# replicates the Branch scope to ADDC01 as standby. Companion dict in group_vars/dc.yml.
dhcp_failover:
  name: "Branch-ADDC02-ADDC01"
  partner: "ADDC01.{{ forest.fqdn }}"
  scope_id: "{{ branch_subnet.cidr.split('/')[0] }}"   # 10.20.0.0
