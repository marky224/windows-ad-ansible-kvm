# and ADDC02. Generated + vault-encrypted 2026-06-03; plaintext never left the shell.
# Consumed by ad_dhcp/tasks/failover.yml (no_log). Could be consolidated into vault.yml.
vault_dhcp_failover_secret: !vault |
          $ANSIBLE_VAULT;1.1;AES256
