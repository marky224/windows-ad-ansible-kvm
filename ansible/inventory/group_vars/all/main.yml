---
# Shared lab constants. Loaded for every host. See inventory/group_vars/all/vault.yml for secrets.

# --- Forest / domain ---
forest:
  fqdn: corp.markandrewmarquez.com
  netbios: CORP

# --- Named domain admin (ADR-032) ---
# Single named *-da admin in OU=Admins, used as steady-state Ansible identity
# after ad_admins role creates it. Convention: <principal>-da. Tiering suffix
# extension (-da-t0 etc.) is the Phase 6+ pattern.
named_admin:
  sam: madmin-da
  upn: "madmin-da@{{ forest.fqdn }}"
  ou_dn: "OU=Admins,DC=corp,DC=markandrewmarquez,DC=com"
  display_name: "madmin (Domain Admin)"
  description: "Steady-state Ansible domain admin per ADR-032"

# --- Network (matches _private/docs/NETWORK.md, ADR-005 + ADR-006) ---
# DHCP layout (production-MSP pattern, M4 design call 2026-05-28):
# One scope spans .50-.199; an exclusion .50-.99 keeps the reservation block
# off dynamic allocation; per-MAC reservations punch through the exclusion.
# Effective dynamic pool is the unexcluded remainder, .100-.199.
# Reservations themselves live in clients.yml + linux_clients.yml group_vars.
corp_subnet:
  cidr: 10.10.0.0/24
  netmask: 255.255.255.0
  gateway: 10.10.0.1
  dc_ip: 10.10.0.10
  dhcp_scope_start: 10.10.0.50
  dhcp_scope_end: 10.10.0.199
  dhcp_reservation_range_start: 10.10.0.50
  dhcp_reservation_range_end: 10.10.0.99
  libvirt_network_name: corp-lab
  libvirt_bridge: virbr-corp
  mac_oui: "52:54:00"  # libvirt-allocated range

# --- Phase 6 multi-site: Branch subnet (ADR-052, see _private/docs/PHASE6-MULTISITE.md) ---
# ISOLATED libvirt network (no NAT/internet). Note the HQ/Branch asymmetry:
#   HQ     : the host IS the gateway+NAT (gateway 10.10.0.1).
#   Branch : VyOS is the gateway (10.20.0.1); the host holds only a passive
#            management bridge IP (10.20.0.2) so Ansible can reach ADDC02 over
#            WinRM WITHOUT a host route. libvirt's isolated-net rules block the
#            host from forwarding between subnets, so VyOS is the only inter-site
#            path. This is the one host-network touch, user-approved 2026-06-01.
branch_subnet:
  cidr: 10.20.0.0/24
  netmask: 255.255.255.0
  libvirt_host_ip: 10.20.0.2     # host's passive mgmt-only bridge IP
  gateway: 10.20.0.1             # VyOS branch leg = ADDC02's default gateway
  dc_ip: 10.20.0.10              # ADDC02
  # DHCP scope for the Branch-Site (SM7) — mirrors the HQ layout: .50-.199 scope,
  # .50-.99 reserved block (exclusion). ADDC02 serves this directly (on-subnet);
  # ADDC01 is the hot-standby partner via the reciprocal failover relationship.
  dhcp_scope_start: 10.20.0.50
  dhcp_scope_end: 10.20.0.199
  dhcp_reservation_range_start: 10.20.0.50
  dhcp_reservation_range_end: 10.20.0.99
  libvirt_network_name: corp-branch
  libvirt_bridge: virbr-branch

# VyOS inter-site router (ADR-052). Managed via the vyos.vyos collection over SSH.
vyos:
  hostname: VYOS01
  hq_ip: 10.10.0.2
  branch_ip: 10.20.0.1
  # NIC MACs — anchor the eth0=HQ / eth1=Branch mapping (net_router_vyos lists the HQ
  # network FIRST so it enumerates as eth0). The hw-id pins in 12-configure-vyos.yml
  # bind these MACs to eth0/eth1 so the mapping survives reboots regardless of PCI slot
  # order. Scheme = 52:54:00:<subnet-octet>:00:<host-octet>; collision-checked vs all 5
  # existing NICs (ADDC01 ..00:00:10, ADDC02 ..20:00:10, clients ..11:11:xx / ..22:22:xx).
  hq_mac: "52:54:00:00:00:02"      # corp-lab leg    -> eth0 = 10.10.0.2 (00 = HQ 10.10, 02 = .2)
  branch_mac: "52:54:00:20:00:01"  # corp-branch leg -> eth1 = 10.20.0.1 (20 = Branch 10.20, 01 = .1)
  wan_latency_ms: 40             # netem delay on the Branch (eth1) egress -> ~40ms inter-site RTT (each HQ<->Branch round-trip crosses it once); see 12-configure-vyos.yml + ADR-054

# Networks the kvm_network role provisions. Each entry renders network.xml.j2.
# corp-lab keeps forward=nat (byte-identical to its pre-Phase-6 definition);
# corp-branch is isolated (no <forward> element).
kvm_networks:
  - name: "{{ corp_subnet.libvirt_network_name }}"
    bridge: "{{ corp_subnet.libvirt_bridge }}"
    host_ip: "{{ corp_subnet.gateway }}"
    netmask: "{{ corp_subnet.netmask }}"
    mac: "52:54:00:f0:00:01"
    forward: nat
  - name: "{{ branch_subnet.libvirt_network_name }}"
    bridge: "{{ branch_subnet.libvirt_bridge }}"
    host_ip: "{{ branch_subnet.libvirt_host_ip }}"
    netmask: "{{ branch_subnet.netmask }}"
    mac: "52:54:00:f0:00:02"
    forward: isolated

# --- libvirt storage pools (ADR-024) ---
libvirt_pools:
  disks: corp-disks    # backed by {{ vm_lab_root }}/disks
  iso: corp-iso        # backed by {{ vm_lab_root }}/iso

# --- Host paths (control node = same host as KVM hypervisor) ---
# Default resolves to $HOME/vm-lab on the control node.
# Override in inventory/host_vars/localhost.yml if a different layout is needed.
vm_lab_root: "{{ lookup('env', 'HOME') }}/vm-lab"
iso_dir: "{{ vm_lab_root }}/iso"
seed_iso_dir: "{{ vm_lab_root }}/seed-iso"
# AD backups live on a DEDICATED physical drive, not the NVMe that hosts the VMs
# (ADR-046: a DC and its backup belong on different disks). The operator mounts
# that drive here ONCE, by hand (PREREQUISITES.md → 'Dedicated backup drive') —
# Ansible never mounts/formats it. ops_backup refuses to write unless this is a
# real mountpoint (ops_backup_require_mountpoint).
backups_dir: "/mnt/dc-backups"

# --- Install media (ADR-018: virtio-win pinned to 0.1.271; never use 0.1.285) ---
# Per ADR-035, Server 2025 has two ISOs: the upstream-pristine RTM media
# (input to kvm_iso_slipstream) and the patched output (default consumed by
# kvm_windows_vm). Until kvm_iso_slipstream has produced the patched ISO,
# windows_server_2025 points at a path that doesn't exist yet — 01-provision-dc.yml
# will fail fast with a clear "missing patched ISO" error in that case.
iso_paths:
  windows_server_2025_pristine: "{{ iso_dir }}/WindowsServer2025.iso"
  windows_server_2025: "{{ iso_dir }}/WindowsServer2025-patched-26100.32860.iso"
  windows_11_enterprise: "{{ iso_dir }}/Windows11Enterprise.iso"
  ubuntu_24_04: "{{ iso_dir }}/noble-server-cloudimg-amd64.img"
  virtio_win: "{{ iso_dir }}/virtio-win-0.1.271.iso"
  # VyOS rolling ISO for the Phase 6 inter-site router (ADR-052). Fetch via
  # _private/scripts/vyos-fetch.sh. Pinned to the dated nightly tag for reproducibility.
  vyos: "{{ iso_dir }}/vyos-2026.05.30-0046-rolling-generic-amd64.iso"

# SHA256 hashes for known-good install media. Provisioning roles assert against
# these before baking ISO contents into shared stages. Add an entry whenever
# you pin a new ISO; leave unset for media we haven't verified.
iso_checksums:
  # Server 2025 Std Eval + Desktop Experience, Sept 2024 RTM build 26100.1742,
  # fetched 2026-05-26 via the official MS fwlink → Azure CDN (5,738,432 KiB).
  windows_server_2025_pristine: d0ef4502e350e3c6c53c15b1b3020d38a5ded011bf04998e950720ac8579b23d
  # Patched ISO SHA256 — produced 2026-05-27 by playbooks/slipstream-iso.yml
  # from pristine RTM 26100.1742 + KB5043080 (checkpoint, Sept 2024) +
  # KB5087539 (target LCU, May 2026, build 26100.32860). Output: 9.13 GB.
  # Subsequent slipstream runs short-circuit on this hash; 01-provision-dc.yml
  # asserts against it before building from the patched media.
  windows_server_2025: 84a05501ba5c018162bb9a0ea9e89bc09175f17abf12f368987bc2f91b613786
  # VyOS rolling 2026.05.30-0046 generic-amd64 ISO (696 MB), fetched + recorded
  # 2026-06-01 via _private/scripts/vyos-fetch.sh. minisign skipped (not installed
  # on the host); integrity pinned by SHA256.
  vyos: 4df499bafd862e6f7ebd17fbd4a4691bbcc093ba885b35abb1bca5a37206321b

# --- WIM edition indices (captured 2026-05-26 from each ISO's sources/install.wim) ---
wim_edition:
  windows_server_2025: 2     # "Windows Server 2025 SERVERSTANDARD" — Standard Eval + Desktop Experience
  windows_11_enterprise: 1   # "Windows 11 Enterprise Evaluation"

# --- Phase 6 SM7: DHCP failover shared secret (inline-vault) ---
