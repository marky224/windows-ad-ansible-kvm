---
# DC-specific overrides.
#
# STEADY-STATE IDENTITY (post-promotion + post-named-admin-creation):
# Connect as the named domain admin (madmin-da) per ADR-032, not as the
# built-in domain Administrator (RID 500). RID 500 is hardened to break-glass
# only by the ad_harden_builtin_admin role (ADR-033) — it cannot authenticate
# via WinRM after that point.
#
# BOOTSTRAP IDENTITY (pre-promotion): plays in 02-configure-dc.yml that run
# BEFORE the named admin exists override these at the play level
# (ansible_user: Administrator + ansible_password: vault_dc_admin_password).
ansible_user: "{{ named_admin.upn }}"
ansible_password: "{{ vault_named_admin_password }}"

# DC role markers — consumed by ad_* roles.
dc_role:
  primary: true
  hold_fsmo_roles: true
  install_dhcp: true
  install_dns: true
  install_ad_cs: true
  install_wsus: true
  is_pdc_time_source: true

# DSRM (Directory Services Restore Mode) password — required by microsoft.ad.domain.
# Kept distinct from vault_dc_admin_password per ADR-031 (defense-in-depth: DSRM
# is the only recovery path back to RID 500 after ADR-033's smartcard-required flag).
safe_mode_password: "{{ vault_safe_mode_password }}"

# --- Phase 6 SM6: DNS client cross-pointing (ADR-052 amendment, 2026-06-03) ---
# SELF-FIRST ordering: ADDC01 prefers ITSELF (loopback) with the cross-site partner
# (ADDC02) as the alternate. Researched + chosen over the originally-sketched
# "partner-first" — which is the CO-LOCATED-LAN pattern — because this is a
# WAN-separated, one-DC-per-site topology:
#   - HQ keeps resolving locally (no 40 ms WAN hop on every uncached lookup, and no
#     dependency on the branch link for the FSMO-holding primary). MS KB 825036 names
#     the remote-preferred failure: "Loss of connectivity to the Preferred DNS server
#     will result in failure to resolve DNS queries from the Domain Controller."
#   - The DNS-island risk (KB 275278, Win2000-era) is already NEUTRALIZED: SM5 verified
#     BOTH replication directions + both _msdcs CNAMEs resolve, and the zones are
#     AD-integrated — so self-first is island-safe. KB 825036 explicitly permits
#     self-as-preferred once replication is verified.
# Applied by playbooks/14-dns-crosspoint.yml via ansible.windows.win_dns_client.
dc_dns_servers:
  - 127.0.0.1                     # preferred: ADDC01 resolves locally (HQ autonomy)
  - "{{ branch_subnet.dc_ip }}"   # alternate: ADDC02 (10.20.0.10) across the inter-site link
