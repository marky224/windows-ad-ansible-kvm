---
# ad_dhcp role defaults.
#
# Production-MSP DHCP layout for the corp lab subnet (10.10.0.0/24):
#
#   .1               Gateway (static, on virbr-corp host)
#   .10              ADDC01 / DC (static, set at OS install)
#   .50 .. .99       Reservation block (DHCP scope + EXCLUSION; reservations
#                     punch through to pin known MACs to known IPs)
#   .100 .. .199     Dynamic pool (free leases)
#   .200 .. .254     Reserved (not in scope)
#
# This matches what a real MSP /24 looks like: ONE scope per subnet, exclusions
# to carve out a reservation range, reservations override the exclusion. The
# scope MUST span the reservation range — Windows DHCP rejects reservations
# whose IPs sit outside any defined scope (ERROR_DHCP_SUBNET_NOT_PRESENT).

ad_dhcp_scope_id: "10.10.0.0"
# IP the DHCP server authorizes itself with in AD (the LOCAL DC's IP). Overridden
# per-group for the Branch replica (ADDC02 = 10.20.0.10) in group_vars/dc_replica.yml (SM7).
ad_dhcp_authorize_ip: "{{ corp_subnet.dc_ip }}"
ad_dhcp_scope_name: "Corp Lab Scope"
ad_dhcp_scope_description: "Single scope for corp.markandrewmarquez.com lab (.50-.199, reservations carved out via exclusion)"
ad_dhcp_scope_start: "{{ corp_subnet.dhcp_scope_start }}"
ad_dhcp_scope_end: "{{ corp_subnet.dhcp_scope_end }}"
ad_dhcp_subnet_mask: "{{ corp_subnet.netmask }}"

# Lease duration. 8 days is the Windows default; appropriate for a settled
# lab where most hosts are reservations + a handful of dynamic test VMs.
ad_dhcp_lease_duration: "8.00:00:00"

# Exclusion ranges within the scope. Reservations sit inside this range and
# override the exclusion on a per-MAC basis.
ad_dhcp_exclusions:
  - start: "{{ corp_subnet.dhcp_reservation_range_start }}"
    end: "{{ corp_subnet.dhcp_reservation_range_end }}"

# Scope options handed out via DHCP.
#   003 (Router):          gateway
#   006 (DNS Servers):     both DCs, LOCAL-FIRST (ADR-056) — the local-site DC preferred,
#                          the cross-site partner DC as the alternate, so a client leased by
#                          the STANDBY during a failover still gets a LIVE resolver (not a dead
#                          single local DC). Set at SCOPE level → rides failover replication.
#                          Client-side mirror of the SM6 self-first DC resolver. Keep it to TWO
#                          (KB 2834226: a 4th+ entry isn't queried until ~4s). Branch scope flips
#                          the order in group_vars/dc_replica.yml.
#   015 (DNS Domain Name): forest FQDN — sets the connection-specific DNS suffix
#   042 (NTP Servers):     DC (PDC is the authoritative NTP source per ad_ntp)
ad_dhcp_scope_options:
  router: "{{ corp_subnet.gateway }}"
  dns_servers:
    - "{{ corp_subnet.dc_ip }}"      # ADDC01 (local/HQ) — preferred
    - "{{ branch_subnet.dc_ip }}"    # ADDC02 (Branch)   — alternate
  dns_domain_name: "{{ forest.fqdn }}"
  ntp_servers:
    - "{{ corp_subnet.dc_ip }}"

# --- Phase 6 SM9 (ADR-058 amendment): classless static routes (DHCP option 121) ---
# HQ clients' default gateway is the HOST (corp_subnet.gateway, 10.10.0.1), which deliberately
# does NOT route into the ISOLATED branch net — so without an explicit route they cannot reach
# ADDC02 (the cross-site DNS/auth failover target, option 006 alternate per ADR-056). The SM9
# live DR drill PROVED this gap: an HQ client couldn't reach ADDC02 on ANY port — `tracert` died
# at hop 1 ("10.10.0.1 reports: Destination protocol unreachable"). Resolver order was correct;
# it just had nowhere to route. This hands HQ clients the branch route via the VyOS HQ leg
# (vyos.hq_ip, 10.10.0.2) — the same next-hop ADDC01 itself uses (12-configure-vyos.yml).
#
# ⚠ RFC 3442: a client that receives option 121 MUST IGNORE option 003 (Router), so the DEFAULT
# route is listed FIRST here — omitting it would strip the client's gateway/internet. Set at SCOPE
# level so it rides DHCP failover replication to the standby (ADR-056). Option **121 only** — NOT the
# legacy Microsoft twin option 249: Win11 honours 121, and Win11 24H2 turned STRICT on DHCP option
# types (a wrongly-typed option → the client fails DHCP / lands on APIPA), so we ride Windows'
# PREDEFINED, correctly-typed `BinaryData` option 121 and avoid adding a second custom option that
# buys nothing on a Win11-only fleet. Each route encodes per RFC 3442 as [prefix byte][significant
# network octets = ceil(prefix/8)][4 gateway octets] — done in tasks/main.yml. Branch clients need
# NONE (their default gateway already IS VyOS) → the dc_replica group overrides this to [].
ad_dhcp_classless_static_routes:
  - network: "0.0.0.0"                                   # default route — RFC 3442 requires it when 121 is present
    prefix: 0
    gateway: "{{ corp_subnet.gateway }}"                 # → host (NAT / internet), unchanged
  - network: "{{ branch_subnet.cidr.split('/')[0] }}"    # 10.20.0.0 — the isolated branch subnet
    prefix: "{{ branch_subnet.cidr.split('/')[1] | int }}"
    gateway: "{{ vyos.hq_ip }}"                          # → VyOS HQ leg (10.10.0.2), routes across to ADDC02

# Reservation source. Defaults compose the two existing group_vars dicts
# (client_dhcp_reservations from clients.yml, linux_client_dhcp_reservations
# from linux_clients.yml) into one dict keyed by hostname. The role looks
# this up via hostvars[first-host-in-group] because group_vars are loaded
# per-host, not at the group level itself.
#
# Each entry: { mac: "52:54:00:xx:xx:xx", ip: "10.10.0.NN" }
# MAC may use ":" or "-" separators; the role normalizes to "-" for the
# DhcpServer cmdlets (which want dash-separated ClientId).
ad_dhcp_reservations: >-
  {{
    (
      (hostvars[(groups.clients | default([''])) | first]
       | default({})).client_dhcp_reservations
      | default({})
    )
    | combine(
        (hostvars[(groups.linux_clients | default([''])) | first]
         | default({})).linux_client_dhcp_reservations
        | default({})
      )
  }}

# --- DHCP failover (Phase 6 SM7 part 2) — shared hot-standby knobs ───────────────
# Per-relationship params (name / partner / scope_id) are per-group in
# group_vars/{dc,dc_replica}.yml (dhcp_failover). The shared secret is
# vault_dhcp_failover_secret (inline-vault, group_vars/all/main.yml). Consumed by
# tasks/failover.yml under become:runas (the create contacts the PARTNER = a 2nd hop).
# Both values are the Microsoft defaults / production recommendations (researched
# + validated 2026-06-03): hot-standby for a routed/branch topology, manual partner-down.
ad_dhcp_failover_reserve_percent: 5       # % of the scope the standby may lease pre-MCLT (MS default)
ad_dhcp_failover_mclt: "01:00:00"         # Maximum Client Lead Time (MS production rec = 1h; cannot be 0)
