---
# Generic Windows VM provisioner (ADR-018, ADR-020, ADR-021, ADR-024 + new ADRs
# pending for the milestone-2 unblock work).
#
# Expects (set by caller):
#   vm_name, vm_install_iso, vm_wim_image_name
# Optional (Autounattend static-IP block conditional):
#   vm_static_ip, vm_default_gateway, vm_dns_servers
#
# Architecture (post-milestone-2 unblock):
#   Server 2025's redesigned 24H2 ("windlp") installer does NOT auto-scan
#   separate removable media for Autounattend.xml the way classic Setup did.
#   We re-master the install ISO per-VM to embed Autounattend.xml at root +
#   a $WinpeDriver$ folder for vioscsi/viostor (WinPE auto-loads anything in
#   $WinpeDriver$, eliminating the chicken-and-egg "load driver to see disk"
#   problem). BOOTX64.EFI is also swapped for cdboot_noprompt.efi so the
#   "Press any key to boot from CD" prompt is bypassed unattended.
#
# Idempotency:
#   - shared install-iso extraction + driver injection: creates: guards
#   - per-VM custom install ISO: rebuilt every run (Autounattend can change)
#   - disk allocation: creates: on qemu-img
#   - libvirt define: virsh list pre-check + community.libvirt.virt is idempotent

- name: "kvm_windows_vm | sanity-check required inputs"
  ansible.builtin.assert:
    that:
      - vm_name is defined
      - vm_install_iso is defined
      - vm_wim_image_name is defined
    fail_msg: "kvm_windows_vm needs vm_name, vm_install_iso, vm_wim_image_name"

# === Shared install-iso stage (built once, reused across all VMs) ============

# Check whether the shared stage is already built. Used both to decide whether
# to verify the install ISO's SHA256 (one-shot before stage rebuild) and as a
# free pre-existence signal for downstream tasks' `creates:` guards.
- name: "kvm_windows_vm | stat shared install-iso stage"
  ansible.builtin.stat:
    path: "{{ vm_install_stage_dir }}/setup.exe"
  register: install_stage_stat

# Verify install ISO matches the known-good SHA256 before its bits get baked
# into the persistent shared stage. Skipped when no hash is provided (other
# VMs) or when the stage is already built (the bits are committed; re-hashing
# the original ISO every run wastes ~30s on 5.6 GB).
- name: "kvm_windows_vm | verify install ISO SHA256 (one-shot before stage build)"
  when:
    - vm_install_iso_sha256 is defined
    - vm_install_iso_sha256 | length > 0
    - not install_stage_stat.stat.exists
  block:
    - name: "kvm_windows_vm | compute install ISO SHA256"
      ansible.builtin.stat:
        path: "{{ vm_install_iso }}"
        checksum_algorithm: sha256
      register: install_iso_stat

    - name: "kvm_windows_vm | assert install ISO SHA256 matches expected"
      ansible.builtin.assert:
        that: install_iso_stat.stat.checksum == vm_install_iso_sha256
        fail_msg: >-
          {{ vm_install_iso }} SHA256 is {{ install_iso_stat.stat.checksum }};
          expected {{ vm_install_iso_sha256 }}. Refusing to bake unknown-provenance
          bits into the shared install-iso stage.

- name: "kvm_windows_vm | ensure shared install-iso stage dir exists"
  ansible.builtin.file:
    path: "{{ vm_install_stage_dir }}"
    state: directory
    mode: '0755'

- name: "kvm_windows_vm | ensure ISO loop-mount point exists"
  become: true
  ansible.builtin.file:
    path: "{{ vm_install_stage_mount }}"
    state: directory
    mode: '0755'

# Server 2025 install ISO is UDF-primary with only an ISO9660 stub; xorriso
# osirrox-extract sees only README.TXT. Loop-mount + rsync gets us the full
# UDF tree reliably. set -eu + trap ensures the mount is always released.
- name: "kvm_windows_vm | extract pristine install ISO to shared stage (loop-mount + rsync)"
  become: true
  ansible.builtin.shell:
    cmd: |
      set -eu
      if mountpoint -q {{ vm_install_stage_mount | quote }}; then
        umount {{ vm_install_stage_mount | quote }}
      fi
      mount -o loop,ro {{ vm_install_iso | quote }} {{ vm_install_stage_mount | quote }}
      trap 'umount {{ vm_install_stage_mount | quote }}' EXIT
      rsync -a --no-perms --no-owner --no-group --chmod=u=rwX,g=rX,o=rX \
        {{ vm_install_stage_mount | quote }}/ {{ vm_install_stage_dir | quote }}/
      chown -R "${SUDO_USER:-root}:${SUDO_USER:-root}" {{ vm_install_stage_dir | quote }}
    creates: "{{ vm_install_stage_dir }}/setup.exe"
    executable: /bin/bash

# NB: We don't bake a $WinpeDriver$ folder. Server 2025 24H2 only invokes
# $WinpeDriver$ AFTER setup.exe launches (per MS Learn limitations doc), which
# is too late for any chicken-and-egg "WinPE needs vioscsi to see the install
# media" scenario. We avoid that scenario altogether by attaching the install
# CD on SATA (see virt-install args below), and let WinPE setup pick up vioscsi
# for the OS disk via Autounattend's PnpCustomizationsWinPE DriverPaths.

- name: "kvm_windows_vm | swap BOOTX64.EFI for cdboot_noprompt.efi (skip CD-boot prompt)"
  ansible.builtin.copy:
    src: "{{ vm_install_stage_dir }}/efi/microsoft/boot/cdboot_noprompt.efi"
    dest: "{{ vm_install_stage_dir }}/efi/boot/bootx64.efi"
    remote_src: true
    mode: '0644'

# === Per-VM ==================================================================

- name: "kvm_windows_vm | ensure per-VM data dirs exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ vm_seed_iso_dir }}"
    - "{{ vm_seed_staging_dir }}"

- name: "kvm_windows_vm | allocate qcow2 disk {{ vm_disk_path }}"
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -o lazy_refcounts=on
      {{ vm_disk_path }} {{ vm_disk_gb }}G
    creates: "{{ vm_disk_path }}"

- name: "kvm_windows_vm | refresh corp-disks pool"
  community.libvirt.virt_pool:
    name: "{{ vm_disk_pool }}"
    command: refresh

- name: "kvm_windows_vm | render Autounattend.xml into per-VM staging"
  ansible.builtin.template:
    src: Autounattend.xml.j2
    dest: "{{ vm_seed_staging_dir }}/Autounattend.xml"
    mode: '0644'

- name: "kvm_windows_vm | render bootstrap.ps1 into per-VM staging"
  ansible.builtin.template:
    src: bootstrap.ps1.j2
    dest: "{{ vm_seed_staging_dir }}/bootstrap.ps1"
    mode: '0644'

# Windows PowerShell 5.1 (which FirstLogonCommands invokes) reads BOM-less
# files as CP1252, so a single em-dash, en-dash, curly quote, NBSP, or
# Unicode minus in the rendered .ps1 silently breaks string parsing and the
# whole script never runs. Fail fast at template time if any non-ASCII byte
# slips into the rendered file (regression guard for the 2026-05-27 em-dash
# bug that took ~30 min of debugging to find).
- name: "kvm_windows_vm | guard rendered bootstrap.ps1 against non-ASCII chars"
  ansible.builtin.shell:
    cmd: |
      offenders=$(grep -nP '[^\x00-\x7F]' {{ vm_seed_staging_dir }}/bootstrap.ps1 || true)
      if [ -n "$offenders" ]; then
        echo "ERROR: non-ASCII char(s) in rendered bootstrap.ps1 (will break PowerShell 5.1 parse):" >&2
        echo "$offenders" >&2
        exit 1
      fi
  changed_when: false

- name: "kvm_windows_vm | build per-VM custom install ISO {{ vm_custom_install_iso_path }}"
  ansible.builtin.command:
    argv:
      - xorriso
      - -as
      - mkisofs
      - -o
      - "{{ vm_custom_install_iso_path }}"
      - -iso-level
      - "4"
      - -joliet
      - -joliet-long
      - -rock
      - -V
      - "{{ vm_install_iso_volid }}"
      - -no-emul-boot                                       # UEFI El Torito: hand efisys_noprompt.bin to firmware
      - -e
      - efi/microsoft/boot/efisys_noprompt.bin              # path inside output ISO (no leading /)
      - -graft-points
      - "/={{ vm_install_stage_dir }}"
      - "/Autounattend.xml={{ vm_seed_staging_dir }}/Autounattend.xml"
  changed_when: true

- name: "kvm_windows_vm | build per-VM seed ISO {{ vm_seed_iso_path }} (bootstrap.ps1 only)"
  ansible.builtin.command:
    argv:
      - xorriso
      - -as
      - mkisofs
      - -o
      - "{{ vm_seed_iso_path }}"
      - -V
      - WINUNATTEND
      - -r
      - -J
      - -joliet-long
      - -graft-points
      - "/bootstrap.ps1={{ vm_seed_staging_dir }}/bootstrap.ps1"
  changed_when: true

- name: "kvm_windows_vm | refresh corp-iso pool"
  community.libvirt.virt_pool:
    name: "{{ libvirt_pools.iso }}"
    command: refresh

# Ubuntu's OVMF won't auto-add removable media to BootOrder on fresh NVRAM, so
# the VM drops to UEFI Interactive Shell instead of booting the install ISO.
# Pre-enroll BootOrder pointing at the standard fallback EFI loader path
# (\EFI\BOOT\BOOTX64.EFI) — which the custom-install-ISO build has swapped
# to cdboot_noprompt.efi for unattended boot.
- name: "kvm_windows_vm | pre-enroll DISK-FIRST BootOrder in per-VM NVRAM {{ vm_nvram_path }}"
  # Deterministic boot order (replaces the old eject race, 2026-06-02): enroll the
  # Windows loader FIRST and the install-CD fallback SECOND, so
  #   BootOrder = [\EFI\Microsoft\Boot\bootmgfw.efi (disk), \EFI\BOOT\BOOTX64.EFI (CD)].
  # Boot 1 (blank disk): bootmgfw is Not Found -> OVMF falls through to the CD ->
  # WinPE installs + bcdboot writes the disk ESP. Boot 2+: bootmgfw exists -> Windows
  # boots; the CD entry is never reached, so WillWipeDisk never re-fires. No eject.
  ansible.builtin.shell:
    cmd: >-
      cp {{ vm_uefi_vars_template }} {{ vm_nvram_path }} &&
      virt-fw-vars --inplace {{ vm_nvram_path }} --append-boot-filepath '\EFI\Microsoft\Boot\bootmgfw.efi' &&
      virt-fw-vars --inplace {{ vm_nvram_path }} --append-boot-filepath '\EFI\BOOT\BOOTX64.EFI'
    creates: "{{ vm_nvram_path }}"

- name: "kvm_windows_vm | list existing libvirt domains (idempotency check)"
  ansible.builtin.command:
    cmd: virsh -c qemu:///system list --all --name
  register: existing_domains
  changed_when: false
  check_mode: false

# virt-install defines + starts in one step. Custom install ISO carries the
# Autounattend + $WinpeDriver$; virtio-win CD-ROM stays attached so post-OS
# roles (guest-tools install, etc.) can find it.
- name: "kvm_windows_vm | provision libvirt domain {{ vm_name }} via virt-install"
  ansible.builtin.command:
    cmd: >-
      virt-install --connect qemu:///system
      --name {{ vm_name }}
      --osinfo {{ vm_os_variant }}
      --memory {{ vm_memory_mb }}
      --vcpus {{ vm_vcpus }}
      --machine {{ vm_machine_type }}
      --cpu host-passthrough
      {% for e in vm_hyperv_enlightenments %}--xml ./features/hyperv/{{ e }}/@state=on {% endfor %}
      --boot uefi{{ ',firmware.feature0.enabled=no,firmware.feature0.name=secure-boot' if not vm_secure_boot else '' }},nvram={{ vm_nvram_path }}
      {% if vm_enable_tpm | bool %}--tpm model=tpm-crb,backend.type=emulator,backend.version={{ vm_tpm_version }}{% else %}--tpm none{% endif %}
      --controller scsi,model=virtio-scsi
      --disk path={{ vm_disk_path }},bus=scsi,format=qcow2,boot.order=1
      --disk path={{ vm_custom_install_iso_path }},device=cdrom,bus=sata,boot.order=2
      --disk path={{ vm_virtio_win_iso }},device=cdrom,bus=sata
      --disk path={{ vm_seed_iso_path }},device=cdrom,bus=sata
      --network network={{ vm_network }},model=virtio{% if vm_mac is defined %},mac={{ vm_mac }}{% endif %}
      --graphics spice,listen=127.0.0.1
      --video qxl
      --noautoconsole
      --wait 0
      --install no_install=yes
  when: vm_name not in existing_domains.stdout_lines

- name: "kvm_windows_vm | ensure libvirt domain {{ vm_name }} is running"
  community.libvirt.virt:
    name: "{{ vm_name }}"
    state: running

# Fix for the Server 2025 24H2 CD-boot-loop:
# After virt-install brings the VM up, the install CD is boot priority 1.
# WinPE pass completes in ~3 min, writes bootmgfw.efi to ESP via bcdboot,
# registers a `Windows Boot Manager` NVRAM Boot#### entry, then reboots.
# But the CD's pre-enrolled \EFI\BOOT\BOOTX64.EFI entry is still first in
# BootOrder → firmware re-enters fresh WinPE setup → DiskConfiguration's
# WillWipeDisk=true wipes ESP → next pass repeats forever.
#
# Workaround (ADR-043): detect "WinPE pass done" via a DISK-WRITE-STALL signal —
# once install.wim is applied (disk grows past the threshold) and bcdboot has
# written the disk's Windows Boot Manager, disk writes go idle just before WinPE
# reboots. That stall is the safe moment to eject + cold-restart so the firmware
# boots the DISK, not the CD again. (The old SPICE screen-blank detector never
# fired on Win 11's solid-blue progress screen, so the CD stayed boot-priority-1
# and WillWipeDisk re-wiped on every reboot — an endless install loop. The
# disk-stall signal is OS-agnostic and fixed it.)
- name: "kvm_windows_vm | check install CD attached (idempotency for replays)"
  ansible.builtin.command:
    cmd: virsh -c qemu:///system domblklist {{ vm_name }}
  register: domblklist_result
  changed_when: false

- name: "kvm_windows_vm | post-WinPE CD eject"
  when:
    - vm_eject_install_cd_after_winpe | bool
    - vm_custom_install_iso_path in domblklist_result.stdout
  block:
    - name: "kvm_windows_vm | wait for WinPE install.wim apply + write-stall (OS-agnostic eject trigger)"
      ansible.builtin.shell:
        cmd: |
          set -u
          # Phase 1: wait until install.wim is being applied (disk past threshold).
          # Phase 2: once applied (and bcdboot has written the disk's Windows Boot
          # Manager), disk writes STALL right before WinPE reboots -> that stall is
          # the safe eject moment. Poll fast + a short stall window to catch it
          # BEFORE the reboot that would otherwise re-boot the CD and re-wipe.
          disk={{ vm_disk_path }}
          applied=0; stall=0; prev=-1
          for i in $(seq 1 {{ vm_eject_wait_max_iters }}); do
            size=$(stat -c %s "${disk}" 2>/dev/null || echo 0)
            if [ "${applied}" -eq 0 ]; then
              if [ "${size}" -gt {{ vm_eject_winpe_disk_threshold_bytes }} ]; then
                echo "iter=${i} disk=${size}B — install.wim applied; watching for write-stall"
                applied=1; prev=${size}
              fi
            else
              if [ "${size}" -eq "${prev}" ]; then
                stall=$((stall + 1))
                if [ "${stall}" -ge {{ vm_eject_stall_samples }} ]; then
                  echo "iter=${i} disk=${size}B — writes stalled ${stall}x ({{ vm_eject_stall_samples }}x{{ vm_eject_poll_secs }}s) -> WinPE done, eject now"
                  exit 0
                fi
              else
                stall=0; prev=${size}
              fi
            fi
            sleep {{ vm_eject_poll_secs }}
          done
          echo "ERROR: timed out waiting for install.wim apply + write-stall (applied=${applied}, stall=${stall})" >&2
          exit 1
      register: winpe_wait
      changed_when: false

    - name: "kvm_windows_vm | report WinPE wait result"
      ansible.builtin.debug:
        var: winpe_wait.stdout_lines

    # Eject + cold-restart sequence. Live-eject alone (Run F 2026-05-27) leaves
    # Windows holding stale CD device handles through the in-process ACPI
    # reboot — bootmgfw then reads BCD that references the no-longer-present
    # CD volume and dies with 0xc0000178 "A required device isn't connected".
    # Forcing a full destroy + cold start makes OVMF re-enumerate devices
    # fresh, sees the empty CD slot, falls through to the disk's Windows Boot
    # Manager NVRAM entry, and bootmgfw resolves BCD against the new device
    # topology cleanly. This deterministically reproduces the working pattern
    # Run C accidentally hit via libvirt's --config-redefine SIGTERM race.
    - name: "kvm_windows_vm | eject install CD ({{ vm_install_cd_target_dev }})"
      ansible.builtin.command:
        cmd: >-
          virsh -c qemu:///system change-media {{ vm_name }}
          {{ vm_install_cd_target_dev }} --eject --live --config
      register: eject_result
      changed_when: "'ejected' in eject_result.stdout"

    - name: "kvm_windows_vm | force cold restart so OVMF re-enumerates without CD media"
      ansible.builtin.shell:
        cmd: |
          set -u
          # libvirt may have already SIGTERMed the VM via --config redefine race;
          # only destroy if still running.
          state=$(virsh -c qemu:///system domstate {{ vm_name }} 2>/dev/null || echo unknown)
          if [ "${state}" = "running" ]; then
            virsh -c qemu:///system destroy {{ vm_name }}
          fi
          # Wait briefly for state to settle before cold-starting.
          for i in $(seq 1 10); do
            state=$(virsh -c qemu:///system domstate {{ vm_name }} 2>/dev/null || echo unknown)
            [ "${state}" = "shut off" ] && break
            sleep 1
          done
          virsh -c qemu:///system start {{ vm_name }}
        executable: /bin/bash
      changed_when: true

# DHCP clients have no vm_static_ip but DO have a known DHCP-reserved address
# (MAC-tied in ad_dhcp). Callers pass that via vm_winrm_wait_host so the role
# can still wait on the right IP. Falls back to vm_static_ip for the DC.
- name: "kvm_windows_vm | wait for WinRM on {{ vm_winrm_wait_host | default(vm_static_ip) | default('the reserved IP') }}:{{ vm_winrm_port }}"
  ansible.builtin.wait_for:
    host: "{{ vm_winrm_wait_host | default(vm_static_ip) | default(omit) }}"
    port: "{{ vm_winrm_port }}"
    timeout: "{{ vm_winrm_timeout }}"
    delay: 60
  when:
    - vm_wait_for_winrm | bool
    - (vm_winrm_wait_host is defined) or (vm_static_ip is defined)
