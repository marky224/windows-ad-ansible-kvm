---
# Phase 6 (ADR-052): configure AD Sites & Services on the existing DC BEFORE the
# Branch replica (ADDC02) is added. Creates HQ-Site (renamed from
# Default-First-Site-Name), Branch-Site, the two subnet objects, and the HQ-Branch
# site link. Router-independent — pure Configuration-partition work on ADDC01, so
# it runs without VyOS or ADDC02 in place.
#
# Connects as the named domain admin (group_vars/dc.yml). Idempotent (ADR-037):
# re-running is a no-op (changed=0).
#
# Run:
#   ansible-playbook -i inventory/lab.yml playbooks/09-configure-sites.yml

- name: "Configure AD Sites & Services on {{ groups['dc'][0] }} (Phase 6 multi-site, ADR-052)"
  hosts: dc
  gather_facts: false
  any_errors_fatal: true   # site.yml fail-fast: abort the whole run on any failure (ADR-050)
  roles:
    - ad_sites
