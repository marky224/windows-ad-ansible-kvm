---
# Build the Win 11 Enterprise client VMs (CLIENT01-corp, CLIENT02-corp).
#
# Reuses the battle-tested kvm_windows_vm role with Win-11 overrides:
#   - install ISO + WIM image = Win 11 Enterprise (edition index 1)
#   - vm_virtio_driver_os=w11  (WinPE loads the w11 vioscsi/NetKVM tree, NOT 2k25)
#   - TPM 2.0 + Secure Boot (Win 11 hard requirements)
#   - DHCP (no static-IP Autounattend block) — MAC-tied reservations in ad_dhcp
#     hand out 10.10.0.50/.51; the role waits for WinRM on that reserved IP.
#   - local Administrator password = vault_client_local_admin_password (split
#     from the DC bootstrap admin per the M6 design decision).
#
# HOST SAFETY: runs only against kvm_host (localhost) for VM lifecycle. It does
# NOTHING to the host OS — only qemu-img/virsh/xorriso + files under ~/vm-lab.
# Builds sequentially (the post-WinPE CD-eject logic watches one VM's SPICE
# screen at a time).
#
# Run: ansible-playbook playbooks/05-provision-clients.yml

- name: "Provision Win 11 client VMs (CLIENT01-corp, CLIENT02-corp)"
  hosts: kvm_host
  gather_facts: false
  any_errors_fatal: true   # site.yml fail-fast: abort the whole run on any failure (ADR-050)
  vars:
    vm_install_iso: "{{ iso_paths.windows_11_enterprise }}"
    vm_install_iso_sha256: "{{ iso_checksums.windows_11_enterprise | default('') }}"
    vm_wim_image_name: "Windows 11 Enterprise Evaluation"
    vm_virtio_driver_os: "w11"
    vm_install_iso_volid: "WIN11ENT_CORPLAB"
    vm_local_admin_password: "{{ vault_client_local_admin_password }}"
    # Win 11 client sizing. Bumped from 2 vCPU/4 GB to 4 vCPU/8 GB (2026-05-29):
    # 4 GB is Win 11's painful floor and 2 vCPU made the 24H2 install ~50 min.
    # Host (5800X3D 8c/16t, 78 GB) has ample headroom — idle clients cost ~0 CPU;
    # install bursts ~4 threads each. Faster installs + a realistic workstation.
    # (ADR to be recorded; fleet table to be updated.)
    vm_memory_mb: 8192
    vm_vcpus: 4
    vm_disk_gb: 40
    vm_os_variant: win11
    # Win 11 requires TPM 2.0 + Secure Boot.
    vm_enable_tpm: true
    vm_secure_boot: true
    # CD-eject is ENABLED (role default) with the disk-write-stall detector
    # (ADR-043). REQUIRED for Win 11 — without it the install CD stays
    # boot-priority-1 and WillWipeDisk re-wipes the disk on every reboot, an
    # endless install loop (hung two clients overnight 2026-05-30). My earlier
    # "Win 11 doesn't need the eject" call was wrong — it was a lucky race.
    # Allow up to 60 min for WinRM (several OOBE reboots).
    vm_winrm_timeout: 3600
  tasks:
    - name: "Build each Win 11 client via kvm_windows_vm"
      ansible.builtin.include_role:
        name: kvm_windows_vm
      vars:
        vm_name: "{{ client_vm }}"
        vm_mac: "{{ hostvars[client_vm].client_dhcp_reservations[client_vm].mac }}"
        # DHCP client: no static IP, but we know the reserved lease — wait for
        # WinRM there (matches the inventory ansible_host).
        vm_winrm_wait_host: "{{ hostvars[client_vm].ansible_host }}"
      # clients_to_build allows (re)building a single client in isolation — e.g.
      # in parallel background runs. Defaults to all clients.
      loop: "{{ clients_to_build | default(groups['clients']) }}"
      # Distinct loop_var so the role's internal loops (which use `item`) don't
      # collide with this play's loop variable.
      loop_control:
        loop_var: client_vm
        label: "{{ client_vm }}"
